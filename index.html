<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radha Textiles - Women Collection</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo">Radha Textiles</div>

  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">

  <div class="icons">
    <span onclick="openProfile()">👤</span>
    <span onclick="openWishlist()">❤️</span>
    <span onclick="openCart()">🛒</span>
  </div>
</header>

<section class="products" id="productContainer"></section>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2>My Profile</h2>
    <input type="text" id="upi" placeholder="Enter UPI ID">
    <input type="text" id="bank" placeholder="Enter Bank Account Number">
    <button onclick="saveDetails()">Save Details</button>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
